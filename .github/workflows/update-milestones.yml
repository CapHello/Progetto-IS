name: Update Milestone Progress

on:
  milestone:
    types: [created, edited, closed, reopened]
  issues:
    types: [opened, edited, closed, reopened, milestoned, demilestoned]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Milestones and Update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Recupero dati con JQ corretto (rimossi i dollari extra)
          MILESTONES_DATA=$(gh api repos/${{ github.repository }}/milestones --jq '. | sort_by(.number) | .[] | "| **\(.title)** | [\(.closed_issues)/\(.open_issues + .closed_issues)] | \(.description // "-") |"')
          
          # 2. Preparazione tabella
          HEADER="| Fase | Task Completati | Descrizione |\n|:---|:---:|:---|"
          export FULL_TABLE="${HEADER}\n${MILESTONES_DATA}"

          # 3. Script Python per rimpiazzare il testo in modo sicuro
          python3 -c "
          import os
          table = os.environ['FULL_TABLE'].replace('\\n', '\n')
          with open('README.md', 'r') as f:
              content = f.read()
          
          start_tag = ''
          end_tag = ''
          
          start_idx = content.find(start_tag) + len(start_tag)
          end_idx = content.find(end_tag)
          
          if start_idx != -1 and end_idx != -1:
              new_content = content[:start_idx] + '\n' + table + '\n' + content[end_idx:]
              with open('README.md', 'w') as f:
                  f.write(new_content)
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update milestone progress" && git push)
